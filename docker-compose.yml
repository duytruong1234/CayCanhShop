version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: caycanh_db
    environment:
      POSTGRES_DB: HeThongBanCayCanh
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "YourStr0ng!Pass"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caycanh_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:YourStr0ng!Pass@db:5432/HeThongBanCayCanh
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_static:/app/static

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: caycanh_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pg_data:
  backend_static:
