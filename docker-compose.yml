version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: caycanh_db
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: "YourStr0ng!Pass"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
      - ./database/init.sql:/scripts/init.sql
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools/bin/sqlcmd", "-u", "-S", "localhost", "-U", "sa", "-P", "YourStr0ng!Pass", "-Q", "SELECT 1" ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Service tự động chạy init.sql sau khi DB sẵn sàng
  db-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: caycanh_db_init
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./database:/scripts
    command: /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "YourStr0ng!Pass" -i /scripts/init.sql
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caycanh_backend
    ports:
      - "8000:8000"
    environment:
      - DB_SERVER=db
      - DB_NAME=HeThongBanCayCanh
      - DB_USER=sa
      - DB_PASSWORD=YourStr0ng!Pass
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_static:/app/static

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: caycanh_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sql_data:
  backend_static:
